<!DOCTYPE html>
<html>
<head>
<title>SITE DEFACED</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #000;
    cursor: url('download.png') 0 0, auto;
    overflow: hidden;
    user-select: none;
}

body:active {
    cursor: url('download2.png') 0 0, auto;
}

.bg-image {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url("download (7).jpg");
    background-size: auto 101%; 
    background-position: center;
    background-repeat: no-repeat;
    filter: contrast(150%) brightness(60%); 
    z-index: 0;
    pointer-events: none;
}

.text-overlay {
    position: fixed;
    top: -10%; left: -10%;
    width: 120vw; height: 120vh; 
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='150'><text x='20' y='80' fill='white' font-family='sans-serif' font-weight='bold' font-size='50' opacity='0.25'>IM STILL HERE</text></svg>");
    background-repeat: repeat;
    z-index: 1;
    pointer-events: none;
}

/* THE BOX - Hidden in the extreme corner */
#box {
    position: absolute;
    /* Pushed 40px off the bottom/right so only a corner shows */
    bottom: -40px;
    right: -40px;
    width: 120px; 
    height: auto;
    z-index: 5;
    transition: transform 0.3s;
}

/* THE BEAR - Tucked away at the top edge */
#bear {
    position: absolute;
    top: -20px;
    left: 20%;
    width: 100px; 
    height: auto;
    z-index: 10;
    cursor: grab;
    pointer-events: all; 
}

#bear:active {
    cursor: grabbing;
}
</style>
</head>
<body>

<div class="bg-image"></div>
<div class="text-overlay"></div>

<img src="jjgjtt.png" id="box">
<img src="bearrq.png" id="bear">

<script>
const bear = document.getElementById('bear');
const box = document.getElementById('box');

let isDragging = false;

bear.addEventListener('mousedown', function(e) {
    isDragging = true;
    let shiftX = e.clientX - bear.getBoundingClientRect().left;
    let shiftY = e.clientY - bear.getBoundingClientRect().top;

    function moveAt(pageX, pageY) {
        bear.style.left = pageX - shiftX + 'px';
        bear.style.top = pageY - shiftY + 'px';
        checkCollision();
    }

    function onMouseMove(e) {
        if (isDragging) moveAt(e.pageX, e.pageY);
    }

    document.addEventListener('mousemove', onMouseMove);

    document.addEventListener('mouseup', function() {
        isDragging = false;
        document.removeEventListener('mousemove', onMouseMove);
    }, { once: true });
});

function checkCollision() {
    const bearRect = bear.getBoundingClientRect();
    const boxRect = box.getBoundingClientRect();

    const isOverlapping = !(
        bearRect.right < boxRect.left || 
        bearRect.left > boxRect.right || 
        bearRect.bottom < boxRect.top || 
        bearRect.top > boxRect.bottom
    );

    if (isOverlapping) {
        window.location.href = "secret.html";
    }
}

bear.ondragstart = function() { return false; };
</script>

</body>
</html>
